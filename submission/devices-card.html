<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AutoSRE devices card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#090c11; --ink:#e9eef5; --muted:#7f8ea3; --dim:#445068;
    --cyan:#22d3ee; --amber:#f2a832;
    --border:#1e2d48; --border-subtle:#141d30;
  }
  *{margin:0;box-sizing:border-box}
  html,body{width:1800px;height:1200px;overflow:hidden;background:var(--navy);color:var(--ink);
    font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .stage{width:1800px;height:1200px;position:relative;padding:72px 96px;
    background:
      radial-gradient(70% 80% at 30% 0%, rgba(34,211,238,.10), transparent 60%),
      radial-gradient(55% 65% at 95% 95%, rgba(242,168,50,.08), transparent 55%),
      linear-gradient(180deg,#0b1018,#090c11)}
  .stage::before{content:"";position:absolute;inset:0;opacity:.45;pointer-events:none;
    background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
    background-size:44px 44px;
    -webkit-mask-image:radial-gradient(80% 80% at 50% 45%,#000 25%,transparent 85%)}
  .inner{position:relative;z-index:2;height:100%}

  .head{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:14px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--cyan);box-shadow:0 0 14px rgba(34,211,238,.8)}
  .name{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:30px;letter-spacing:-.02em;color:#fff}
  .pill{font-family:"JetBrains Mono",monospace;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
    border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:9px 18px}

  .title{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:54px;letter-spacing:-.02em;
    line-height:1.08;margin-top:38px;max-width:1100px}
  .title .accent{background:linear-gradient(90deg,#f2a832,#e85d9e);-webkit-background-clip:text;background-clip:text;color:transparent}
  .subtitle{margin-top:18px;font-size:18px;line-height:1.55;color:var(--muted);max-width:880px}
  .subtitle strong{color:var(--ink);font-weight:600}

  .scene{position:absolute;left:0;right:0;bottom:-6px;height:760px}

  /* laptop */
  .laptop{position:absolute;left:40px;bottom:40px;width:1180px}
  .lscreen{border:2px solid #232c3c;border-bottom:none;border-radius:22px 22px 0 0;overflow:hidden;background:#000;
    box-shadow:0 60px 140px rgba(0,0,0,.65),0 0 90px rgba(242,168,50,.05);padding:14px 14px 0 14px}
  .lscreen img{display:block;width:100%;border-radius:8px 8px 0 0}
  .lbase{height:26px;background:linear-gradient(180deg,#2a3344,#161d2a);border-radius:0 0 18px 18px;position:relative}
  .lbase::before{content:"";position:absolute;left:50%;top:0;transform:translateX(-50%);
    width:190px;height:11px;background:#0d1320;border-radius:0 0 12px 12px}

  /* phone */
  .phone{position:absolute;right:64px;bottom:24px;width:300px;border-radius:44px;border:2px solid #2a3344;
    background:#000;padding:12px;box-shadow:0 50px 120px rgba(0,0,0,.7),0 0 70px rgba(34,211,238,.08)}
  .phone .screen{border-radius:34px;overflow:hidden;position:relative}
  .phone img{display:block;width:100%}
  .phone .notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:96px;height:24px;border-radius:13px;background:#000;z-index:3}
</style>
</head>
<body>
<div class="stage"><div class="inner">

  <div class="head">
    <div class="brand"><span class="dot"></span><span class="name">autosre</span></div>
    <div class="pill">Mission Control · any screen</div>
  </div>

  <div class="title">The 3am page, reduced to <span class="accent">one decision.</span></div>
  <div class="subtitle">The agent investigates and queues the fix; the approval card follows you to whatever screen you are near. <strong>Approve or reject, one tap either way,</strong> and both outcomes land in the audit trail.</div>

  <div class="scene">
    <div class="laptop">
      <div class="lscreen"><img src="gallery/gallery-03-approval-gate.png" alt="Mission Control paused at the approval gate" /></div>
      <div class="lbase"></div>
    </div>
    <div class="phone">
      <div class="notch"></div>
      <div class="screen"><img src="assets/mobile-demo.png" alt="Mission Control on a phone" /></div>
    </div>
  </div>

</div></div>
</body>
</html>
